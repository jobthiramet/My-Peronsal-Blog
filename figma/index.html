<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <title>Property Rental Card</title>
</head>
<body>

  <div class="property-card">
    
    <div class="card-image-wrapper">
      <img src="./Rectangle%2017.png" alt="Apartment Room" class="room-img" />
      
      <div class="rental-badge">
        <i class="fa-solid fa-circle-dollar-to-slot"></i> For Rental
      </div>
    </div>

    <div class="card-info">
      
      <div class="price-type-row">
        <div class="price">
          <i class="fa-solid fa-circle-dollar-to-slot icon-dollar"></i> 3,000
        </div>
        <div class="property-type">
          <i class="fa-solid fa-building"></i> Apartment
        </div>
      </div>

      <p class="address">
        86872 Jacob Gateway,<br>
        Durganport, WV 48044
      </p>

      <div class="amenities-row">
        <div class="amenity">
          <i class="fa-solid fa-bed"></i> 4
        </div>
        <div class="amenity">
          <i class="fa-solid fa-bath"></i> 2
        </div>
        <div class="amenity">
          <i class="fa-solid fa-maximize"></i> 180 m2
        </div>
        <div class="amenity">
          <i class="fa-solid fa-paw"></i>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
